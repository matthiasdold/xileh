quartodoc:
  title: API Reference
  package: xileh
  dir: docs/api
  sidebar: docs/_sidebar.yml
  options:
    include_empty: false
    include_classes: true
    include_functions: true
  parser: numpy
  renderer:
    style: markdown
    show_signature: true
    show_signature_annotations: true
    display_name: relative
  sections:
    - title: Pipeline data container
      desc: |
        The hierarchical data container passed between processing steps.
        [View source](https://github.com/bsdlab/xileh/blob/main/src/xileh/core/pipelinedata.py)
      package: xileh.core.pipelinedata
      contents:
        - name: xData
        - name: from_dict
        - name: from_container
    - title: Pipeline
      desc: |
        Composable pipelines operating on xData containers.
        [View source](https://github.com/bsdlab/xileh/blob/main/src/xileh/core/pipeline.py)
      package: xileh.core.pipeline
      contents:
        - name: xPipeline
    - title: Progress bars
      desc: |
        Rich-backed progress bar wrapper.
        [View source](https://github.com/bsdlab/xileh/blob/main/src/xileh/utils/progress.py)
      package: xileh.utils.progress
      contents:
        - name: tqdm
