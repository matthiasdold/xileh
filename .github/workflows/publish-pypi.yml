name: Build and Publish Python Package

on:
  release:
    types: [published]  # Fires when a GitHub Release is published (creates tag + notes)

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest

    # These permissions are required for PyPI Trusted Publishing (OIDC)
    permissions:
      id-token: write  # Required to authenticate with PyPI
      contents: read   # Required to checkout the code

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Verify tag matches package version
        run: |
          TAG=${GITHUB_REF_NAME#v}
          PKG=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "release tag: $TAG | pyproject version: $PKG"
          test "$TAG" = "$PKG" || { echo "::error::tag $TAG does not match pyproject version $PKG"; exit 1; }

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build the package (sdist and wheel)
        run: python -m build

      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
